[project]
name = "personal-assistant"
version = "0.1.0"
description = "Personal Assistant — multi-agent system for note management, search, and decision support"
readme = "README.md"
authors = [
    { name = "Mateusz Kubaszek", email = "mkubasz@gmail.com" }
]
requires-python = "==3.14.*"
dependencies = [
    "agentic",
    "agentic-runtime",
    "chat",
    "evaluation",
    "knowledge-base",
    "registry",
    "structlog>=25.5.0",
]

[project.scripts]
personal-assistant = "personal_assistant:main"

[build-system]
requires = ["uv_build>=0.8.22,<0.9.0"]
build-backend = "uv_build"
