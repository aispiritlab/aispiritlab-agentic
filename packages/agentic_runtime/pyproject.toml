[project]
name = "agentic-runtime"
version = "0.1.0"
description = "Generic agent orchestration framework"
readme = "README.md"
authors = [
    { name = "Mateusz Kubaszek", email = "mkubasz@gmail.com" }
]
requires-python = "==3.14.*"
dependencies = [
    "cachetools>=7.0.5",
    "registry",
    "agentic",
    "evaluation",
    "httpx>=0.28.1",
    "redis>=6.2.0",
    "structlog>=25.5.0",
]

[build-system]
requires = ["uv_build>=0.10.5,<0.11.0"]
build-backend = "uv_build"
