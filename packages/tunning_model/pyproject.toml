[project]
name = "tunning-model"
version = "0.1.0"
description = "Colab-first fine-tuning assets for Qwen3.5 4B training on AI Spirit datasets."
readme = "README.md"
authors = [
    { name = "Mateusz Kubaszek", email = "mkubasz@gmail.com" }
]
requires-python = "==3.14.*"
dependencies = [
    "structlog>=25.5.0",
]

[project.scripts]
tunning-model = "tunning_model:main"

[build-system]
requires = ["uv_build>=0.10.5,<0.11.0"]
build-backend = "uv_build"
